    async function saveTask(mode) {
    let task = {};
    if (mode === 'Adjustment') {
        task = {
            client_name: document.getElementById('client').value || 'General',
            task_detail: document.getElementById('adjDetail').value || 'Adjustment',
            task_type: 'Adjustment',
            units: 0, cpp: 0,
            payable: parseFloat(document.getElementById('adjAmount').value) || 0,
            status: 'Done'
        };
    } else {
        const type = document.getElementById('type').value;
        const unit = parseFloat(document.getElementById('unit').value) || 0;
        const cpp = parseFloat(document.getElementById('cpp').value) || 0;
        let pay = (type === 'Quiz' || type === 'Midterm') ? cpp : unit * cpp;
        
        task = {
            client_name: document.getElementById('client').value || 'Unknown',
            task_detail: document.getElementById('detail').value || 'New Task',
            task_type: type,
            units: unit, 
            cpp: cpp,
            deadline: document.getElementById('deadline').value || null,
            alert_lead_hours: parseFloat(document.getElementById('alertLeadTime').value) || 1,
            payable: pay,
            status: 'Pending'
        };
    }

    // CHECK CONNECTION STATUS
    if (navigator.onLine) {
        const { error } = await supabaseClient.from('tasks').insert([task]);
        if (error) alert(error.message); else { fetchTasks(); }
    } else {
        // SAVE LOCALLY IF OFFLINE
        let offlineTasks = JSON.parse(localStorage.getItem('offlineTasks') || "[]");
        offlineTasks.push(task);
        localStorage.setItem('offlineTasks', JSON.stringify(offlineTasks));
        
        alert("Offline: Task saved to browser storage. It will sync automatically when internet returns.");
        // Optional: Refresh local table view if you've built an offline renderer
    }
}

async function fetchTasks() {
    // 1. Safety check for connection
    if (!navigator.onLine) {
        console.log("Offline mode: Skipping cloud fetch.");
        return; 
    }

    // 2. Pull all tasks from Supabase
    const { data, error } = await supabaseClient
        .from('tasks')
        .select('*')
        .order('created_at', { ascending: false });

    if (error) {
        console.error("Error fetching tasks:", error.message);
        return;
    }

    // 3. Distribute the data to the correct UI sections
    // Active Section: Tasks that are 'Pending' (with alarm) or 'Done' (waiting for invoice)
    const activeTasks = data.filter(t => t.status === 'Pending' || t.status === 'Done');
    renderActive(activeTasks);

    // Pending Payment: Tasks that have been 'Invoiced' but not yet 'Paid'
    const pendingPaymentTasks = data.filter(t => t.status === 'Invoiced');
    renderPendingPayment(pendingPaymentTasks);

    // History: Tasks that are fully 'Paid'
    const historyTasks = data.filter(t => t.status === 'Paid');
    renderHistory(historyTasks);

    // 4. Run the alarm check now that we have fresh data
    checkDeadlines(data);
}

async function renderActive(tasks) {
    const body = document.getElementById('tableBody');
    body.innerHTML = '';
    let gross = 0, advances = 0;

    // 1. Fetch all employers once so we can build the "Move" dropdown
    const { data: employersList } = await supabaseClient.from('employers').select('id, employer_name');
    
    // Create the HTML options for the dropdown
    let employerOptions = (employersList || []).map(e => 
        `<option value="${e.id}">${e.employer_name}</option>`
    ).join('');

    // 2. Group tasks by client name
    const grouped = tasks.reduce((acc, t) => {
        const client = t.client_name || 'Unassigned';
        if (!acc[client]) acc[client] = [];
        acc[client].push(t);
        return acc;
    }, {});

    // 3. Loop through each client group
    for (let client in grouped) {
        body.innerHTML += `<tr class="client-header"><td colspan="7" style="background:#dfe6e9; font-weight:bold;">${client.toUpperCase()}</td></tr>`;
        
        grouped[client].forEach(t => {
            if (t.status !== 'Cancelled') {
                if (t.task_type === 'Adjustment') advances += t.payable;
                else gross += t.payable;
            }
            
            const timeLeft = getRemainingTime(t.deadline);
            const isUrgent = timeLeft !== "No Deadline" && timeLeft !== "OVERDUE" && parseInt(timeLeft) < (t.alert_lead_hours || 24);
            const statusClass = t.status === 'Pending' ? 'status-pending' : '';
            const timeStyle = isUrgent ? 'color: #e74c3c; font-weight: bold;' : '';

            body.innerHTML += `
                <tr>
                    <td>${t.task_detail}</td>
                    <td>${t.task_type === 'Adjustment' ? '-' : (t.task_type === 'Quiz' ? 'quiz' : t.units)}</td>
                    <td>${t.cpp}</td>
                    <td>${t.payable}</td>
                    <td style="${timeStyle}">${timeLeft}</td> 
                    <td class="${statusClass}">${t.status}</td>
                    <td>
                        <button onclick="updateStatus('${t.id}','Done')">Done</button>
                        <button onclick="updateStatus('${t.id}','Cancelled')">X</button>
                        
                        <div style="margin-top:8px; border-top:1px solid #ddd; padding-top:5px;">
                            <select id="move-to-${t.id}" style="width:100px; font-size:11px; height:30px;">
                                <option value="">Move to...</option>
                                ${employerOptions}
                            </select>
                            <button onclick="moveOrder('${t.id}')" style="background:#f39c12; color:white; border:none; padding:4px; font-size:10px; border-radius:3px;">Go</button>
                        </div>
                    </td>
                </tr>`;
        });
    }

    document.getElementById('subTotal').innerText = gross;
    document.getElementById('adjTotal').innerText = advances;
    document.getElementById('grandTotal').innerText = gross + advances;
}

function renderPendingPayment(tasks) {
    const body = document.getElementById('pendingPaymentBody');
    if (!body) return; // Safety check
    body.innerHTML = '';

    tasks.forEach(t => {
        body.innerHTML += `
            <tr>
                <td>${t.invoice_no || 'N/A'}</td>
                <td>${t.client_name}</td>
                <td>${t.task_detail}</td>
                <td>${t.payable}</td>
                <td>
                    <button onclick="updateStatus('${t.id}', 'Paid')" style="background: #27ae60; color:white; border:none; padding:5px; cursor:pointer; border-radius:3px;">
                        Confirm Payment
                    </button>
                </td>
            </tr>`;
    });
}

    function renderHistory(tasks) {

    async function updateStatus(id, s) { await supabaseClient.from('tasks').update({ status: s }).eq('id', id); fetchTasks(); }

    async function generateAndClear() {
    // 1. Fetch only 'Done' tasks (avoiding Pending or already Invoiced)
    const { data } = await supabaseClient.from('tasks')
        .select('*')
        .eq('status', 'Done');

    if (!data || data.length === 0) return alert("No 'Done' tasks to invoice!");

    // 2. Generate unique Invoice Number (e.g., INV-123456)
    const invNo = "INV-" + Date.now().toString().slice(-6);

    // 3. Build the Word document HTML
    let html = `
        <h2 style="text-align:center; font-family:Arial;">INVOICE: ${invNo}</h2>
        <p style="text-align:center; font-family:Arial;">Date: ${new Date().toLocaleDateString()}</p>
        <table border="1" style="width:100%; border-collapse:collapse; font-family:Arial;">
            <tr style="background:#eeeeee;">
                <th>DETAILS</th><th>PAGES</th><th>CPP</th><th>PAYABLE</th>
            </tr>`;

    const grouped = data.reduce((acc, t) => {
        const client = t.client_name || 'General';
        if (!acc[client]) acc[client] = [];
        acc[client].push(t);
        return acc;
    }, {});

    for (let client in grouped) {
        html += `<tr style="background:#f2f2f2;"><td colspan="4"><b>${client}</b></td></tr>`;
        grouped[client].forEach(t => {
            html += `
                <tr>
                    <td>${t.task_detail}</td>
                    <td>${t.task_type === 'Adjustment' ? '' : (t.task_type === 'Quiz' ? 'quiz' : t.units)}</td>
                    <td>${t.cpp || ''}</td>
                    <td>${t.payable}</td>
                </tr>`;
        });
    }

    const total = document.getElementById('subTotal').innerText;
    const final = document.getElementById('grandTotal').innerText;
    
    html += `
        <tr><td colspan="3" align="right"><b>TOTAL</b></td><td><b>${total}</b></td></tr>
        <tr><td colspan="3" align="right"><b>PAYABLE</b></td><td><b>${final}</b></td></tr>
        </table>`;

    // 4. Trigger Download
    let link = document.createElement('a');
    link.href = URL.createObjectURL(new Blob(['\ufeff', html], { type: 'application/msword' }));
    link.download = `Invoice_${invNo}.doc`;
    link.click();

    // 5. Update Database: Move to 'Invoiced' (Pending Payment) and store the INV #
    const ids = data.map(t => t.id);
    await supabaseClient.from('tasks')
        .update({ 
            status: 'Invoiced', 
            invoice_no: invNo 
        })
        .in('id', ids);

    // Refresh UI to show the new "Pending Payment" section
    fetchTasks();
}

}

// 2. Fetch data from your performance_history table
async function updatePerformanceGraph() {
    const { data, error } = await supabaseClient
        .from('performance_history')
        .select('*')
        .order('submission_date', { ascending: true });

    if (error) return console.error(error);

    // Map data to the chart
    myChart.data.labels = data.map((d, i) => `Inv #${i + 1}`);
    myChart.data.datasets[0].data = data.map(d => d.total_gross);
    myChart.data.datasets[1].data = data.map(d => d.final_payable);
    myChart.data.datasets[2].data = data.map(d => d.savings_amount);
    myChart.update();
}

window.isSnoozed = false; // Add this line

function checkDeadlines(tasks) {
    if (window.isSnoozed) return; // Don't trigger if snooze is active

    const now = new Date();
    tasks.forEach(t => {
        if (t.status === 'Pending' && t.deadline) {
            const deadlineDate = new Date(t.deadline);
            const leadTimeMs = (t.alert_lead_hours || 1) * 60 * 60 * 1000;
            const alertTriggerTime = new Date(deadlineDate.getTime() - leadTimeMs);

            if (now >= alertTriggerTime && now < deadlineDate) {
                triggerAlarm();
                sendDesktopNotification(t);
            }
        }
    });
}

function sendDesktopNotification(task) {
    if (Notification.permission === "granted") {
        // Trigger the audio alarm manually here to ensure it rings with the popup
        triggerAlarm(); 

        const notification = new Notification("Order Due Soon! 🚨", {
            body: `Task: ${task.task_detail}\nDue in: ${getRemainingTime(task.deadline)}`,
            icon: "https://cdn-icons-png.flaticon.com/512/1827/1827347.png",
            silent: false // Some browsers respect this to allow a system beep
        });
    }
}

function triggerAlarm() {
    const alarm = document.getElementById('dueAlarm');
    const banner = document.getElementById('alarmBanner');
    const vol = document.getElementById('volSlider').value; // Get slider value
    
    banner.style.display = 'block';
    flashTitle(); // Start taskbar pulsing
    
    if (!alarmInterval) {
        alarm.muted = false; 
        alarm.volume = vol; // Apply slider volume
        alarm.play().catch(e => console.error("Playback failed:", e));
        
        alarmInterval = setInterval(() => {
            alarm.currentTime = 0;
            alarm.play();
        }, 5000);
    }
}

function stopAlarm() {
    const alarm = document.getElementById('dueAlarm');
    const banner = document.getElementById('alarmBanner');
    
    clearInterval(alarmInterval);
    alarmInterval = null;
    stopFlashing(); // Stop taskbar pulsing
    
    alarm.pause();
    alarm.currentTime = 0;
    banner.style.display = 'none';
}

function getRemainingTime(deadline) {
    if (!deadline) return "No Deadline";
    
    const now = new Date();
    const target = new Date(deadline);
    const diff = target - now;

    if (diff <= 0) return "OVERDUE";

    const hours = Math.floor(diff / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    
    return `${hours}h ${minutes}m`;
}

let snoozedTasks = {}; // Stores IDs of tasks that are currently snoozed

let snoozeTimer;

function snoozeAlarm() {
    stopAlarm(); // Hide banner and stop audio
    
    window.isSnoozed = true;
    let secondsLeft = 15 * 60; // 15 minutes in seconds
    const display = document.getElementById('snoozeCountdown');
    
    display.innerText = `Snoozed: 15:00`;
    
    snoozeTimer = setInterval(() => {
        secondsLeft--;
        let mins = Math.floor(secondsLeft / 60);
        let secs = secondsLeft % 60;
        display.innerText = `Snoozed: ${mins}:${secs < 10 ? '0'+secs : secs}`;
        
        if (secondsLeft <= 0) {
            clearInterval(snoozeTimer);
            window.isSnoozed = false;
            display.innerText = "";
            console.log("Snooze ended, alarm re-enabled.");
        }
    }, 1000);
}

		async function addOrder() {
    // 1. Check if an employer is selected
    if (typeof currentEmployerId === 'undefined' || !currentEmployerId) {
        alert("Select an Employer tab first so we know who this work is for!");
        return;
    }

    // 2. Gather data from the form
    const detail = document.getElementById('detail').value;
    const deadline = document.getElementById('deadline').value;
    const client = document.getElementById('client').value;
    const type = document.getElementById('type').value;
    const unit = parseFloat(document.getElementById('unit').value) || 0;
    const cpp = parseFloat(document.getElementById('cpp').value) || 0;
    
    // Calculate pay based on type (Logic from your saveTask function)
    let pay = (type === 'Quiz' || type === 'Midterm') ? cpp : unit * cpp;

    // 3. Create the order object (Declared ONLY ONCE)
    const newOrderData = {
        detail: detail,
        client_name: client,
        task_type: type,
        units: unit,
        cpp: cpp,
        payable: pay,
        deadline: deadline,
        employer_id: currentEmployerId, 
        status: 'pending',
        created_at: new Date().toISOString()
    };

    try {
        // 4. Save to Supabase (Cloud)
        // Note: Using 'tasks' as the table name since that is what your SQL/fetch uses
        const { data, error } = await supabaseClient
            .from('tasks') 
            .insert([newOrderData])
            .select();

        if (error) throw error;

        // 5. Save to Phone Storage (Local Alarm)
        if (data && data[0]) {
            saveOrderToPhone({ ...newOrderData, id: data[0].id });
        }

        alert("Order saved to Cloud and Phone!");
        fetchTasks(); // Refresh your table
        
        // Clear inputs
        document.getElementById('detail').value = '';
    } catch (err) {
        console.warn("Cloud save failed, saving locally only:", err.message);
        const tempOrder = { ...newOrderData, id: 'temp-' + Date.now() };
        saveOrderToPhone(tempOrder);
        alert("Saved to phone only (Offline).");
    }
}
		
		// This saves your orders to the phone's "Internal Memory"
		function saveOrderToPhone(order) {
			const request = indexedDB.open("OrdersDB", 1);
			
			request.onupgradeneeded = (e) => {
				const db = e.target.result;
				if (!db.objectStoreNames.contains("orders")) {
					db.createObjectStore("orders", { keyPath: "id" }); // Use Supabase ID as key
				}
			};

			request.onsuccess = (e) => {
				const db = e.target.result;
				const transaction = db.transaction("orders", "readwrite");
				const store = transaction.objectStore("orders");
				
				// Use .put() instead of .add() - it will update if exists, or add if new
				store.put(order); 
				
				transaction.oncomplete = () => {
					console.log("Local alarm data synced to phone storage.");
				};
			};
		}

async function loadEmployers() {
    const { data: employers, error } = await supabaseClient
        .from('employers')
        .select('*');
    
    if (error) {
        console.error("Error loading employers:", error.message);
        return;
    }

        btn.innerText = emp.employer_name;
        btn.id = `emp-tab-${emp.id}`;
        btn.onclick = () => switchToEmployer(emp);
        tabContainer.appendChild(btn);
    });

    // Automatically select the first one if available
    if (employers.length > 0) {
        switchToEmployer(employers[0]);
    }
}

// This "Swaps" your entire view to a specific boss
async function switchToEmployer(employer) {
    currentEmployerId = employer.id;

    // 1. Update UI Selection (Visual feedback)
    document.querySelectorAll('#employer-tabs .tab').forEach(t => t.classList.remove('active'));
    const activeTab = document.getElementById(`emp-tab-${employer.id}`);
    if (activeTab) activeTab.classList.add('active');

    // 2. Fetch ONLY the tasks for THIS employer
    fetchTasksByEmployer(employer.id);
}

async function fetchTasksByEmployer(empId) {
    if (!navigator.onLine) return;

    const { data, error } = await supabaseClient
        .from('tasks')
        .select('*')
        .eq('employer_id', empId) // THE FILTER: Only show this boss's work
        .order('created_at', { ascending: false });

    if (error) {
        console.error("Fetch error:", error.message);
        return;
    }

    renderActive(data.filter(t => t.status === 'Pending' || t.status === 'Done'));
    renderPendingPayment(data.filter(t => t.status === 'Invoiced'));
}

async function transferOrder(orderId, newEmployerId) {
    const { error } = await supabaseClient
        .from('tasks')
        .update({ employer_id: newEmployerId })
        .eq('id', orderId);

    if (error) {
        alert("Transfer failed: " + error.message);
    } else {
        alert("Order moved successfully!");
        // Refresh the current view
        fetchTasksByEmployer(currentEmployerId); 
    }
}

async function moveOrder(orderId) {
    const selector = document.getElementById(`move-to-${orderId}`);
    const newEmployerId = selector.value;

    if (!newEmployerId) {
        alert("Please select a destination employer.");
        return;
    }

    const { error } = await supabaseClient
        .from('tasks')
        .update({ employer_id: newEmployerId })
        .eq('id', orderId);

    if (error) {
        alert("Update failed: " + error.message);
    } else {
        alert("Order moved successfully!");
        // Refresh the current workspace to reflect the change
        fetchTasksByEmployer(currentEmployerId); 
    }
}
